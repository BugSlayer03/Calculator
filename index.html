<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="header">
        <span class="heading">Calculator</span>

        <div class="right-section">
            <img src="sun-solid.png" alt="" class="Mode">
        </div>
    </div>

    <div class="content">
        <div class="row1 row">
            <input type="text" name="Result" id="Result" class="result" placeholder="" readonly>
            <input type="button" name="Cancel" id="Cancel" class="cancel" value="C">
        </div>
        <div class="row2 row">
            <input type="button" value="7" class="seven button">
            <input type="button" value="8" class="eight button">
            <input type="button" value="9" class="nine button">
            <input type="button" value="X" class="mult button">
        </div>
        <div class="row3 row">
            <input type="button" value="4" class="four button">
            <input type="button" value="5" class="five button">
            <input type="button" value="6" class="six button">
            <input type="button" value="-" class="minus button">
        </div>
        <div class="row4 row">
            <input type="button" value="1" class="one button">
            <input type="button" value="2" class="two button">
            <input type="button" value="3" class="three button">
            <input type="button" value="+" class="plus button">
        </div>
        <div class="row5 row">
            <input type="button" value="0" class="zero button">
            <input type="button" value="." class="point button">
            <input type="button" value="/" class="divide button">
            <input type="button" value="=" class="equal button">
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
